# =============================================================================
# Gaming Platform — full stack.
# Run from the repository root:
#     docker compose -f docker/docker-compose.yml up --build
# =============================================================================

name: stp-simulation-cache

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-gaming_platform}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gaming} -d ${POSTGRES_DB:-gaming_platform}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gaming

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gaming

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-gaming}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-gaming_platform}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gaming

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Gaming Platform}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
        NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-production}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gaming

  # One-shot database migration runner. Not started by default — run explicitly
  # before deploying a new backend version:
  #     docker compose -f docker/docker-compose.yml --profile migrate run --rm migrate
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    profiles: ['migrate']
    restart: 'no'
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gaming}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-gaming_platform}?schema=public
    entrypoint: ['/sbin/tini', '--']
    working_dir: /app/packages/database
    command: ['pnpm', 'exec', 'prisma', 'migrate', 'deploy']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gaming

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gaming

volumes:
  postgres_data:
  redis_data:

networks:
  gaming:
    driver: bridge
