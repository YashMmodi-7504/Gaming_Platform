name: Release

# Build, scan and publish versioned container images on a semver tag.
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  images:
    name: Build · scan · push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.app }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan published image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ github.ref_name }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0' # report-only; flip to '1' to block on findings
          ignore-unfixed: true

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Container images published to GHCR:
            - `${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}`

            Deploy: see `docs/release-candidate-3-deployment.md`.
            Rollback: run the **Rollback** workflow with a previous tag.
